# MITMRouter — Ethernet-Only Profile
# ---------------------------------------------------------------------------
# For wired network interception. No Wi-Fi AP is created.
# Suitable for lab benches and dedicated interception hosts with two
# Ethernet interfaces (upstream + downstream).
# ---------------------------------------------------------------------------

network:
  wan_interface: eth0       # upstream / internet-facing
  lan_interface: eth1       # downstream / device under test
  bridge_name: br0
  # WiFi is disabled for this profile
  wifi_enabled: false

wifi:
  enabled: false

dhcp:
  start_ip: 192.168.204.100
  end_ip: 192.168.204.150
  subnet_mask: 255.255.255.0
  gateway: 192.168.204.1
  lease_time: 3600

mitmproxy:
  version: "10.4.2"
  listen_port: 8080
  web_port: 8081
  mode: "transparent"
  log_level: info

logging:
  level: INFO
  output: /var/log/mitmrouter/ethernet.log

evidence:
  output_dir: /var/log/mitmrouter/evidence/ethernet
  formats:
    - json
    - pcap

addons:
  enabled:
    - inventory_tracker
    - json_traffic_logger
    - certificate_logger
    - api_spec_extractor
    - wireshark_dissector
  disabled:
    - suricata_ids
    - zeek_network_monitor
  config:
    wireshark_dissector:
      output_dir: /var/log/mitmrouter/evidence/ethernet/tshark
