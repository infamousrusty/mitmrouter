# git-cliff configuration for conventional-commit changelogs
[changelog]
header = "# Changelog\n\nAll notable changes to mitmrouter are documented here.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/infamousrusty/mitmrouter/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI / CD" },
  { message = "^chore", group = "Chores" },
  { message = "^security", group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+"
