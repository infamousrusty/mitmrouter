name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write   # for SLSA provenance / Sigstore

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      # ---------------------------------------------------------------- #
      # Build archive                                                    #
      # ---------------------------------------------------------------- #
      - name: Build source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive --format=tar.gz \
            --prefix="mitmrouter-${TAG}/" \
            "${TAG}" \
            -o "dist/mitmrouter-${TAG}.tar.gz"

      # ---------------------------------------------------------------- #
      # Generate SBOM                                                    #
      # ---------------------------------------------------------------- #
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CycloneDX + pip-audit
        run: pip install cyclonedx-bom pip-audit

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          pip install -r requirements.txt
          cyclonedx-py environment \
            --output-format json \
            --output-file dist/sbom-cyclonedx.json

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --format json -o dist/pip-audit.json || true

      # ---------------------------------------------------------------- #
      # Checksums                                                        #
      # ---------------------------------------------------------------- #
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      # ---------------------------------------------------------------- #
      # Sign with Sigstore (keyless, SLSA-compatible)                   #
      # ---------------------------------------------------------------- #
      - name: Sign release artefacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: dist/mitmrouter-*.tar.gz dist/sbom-cyclonedx.json dist/SHA256SUMS.txt

      # ---------------------------------------------------------------- #
      # Generate changelog                                               #
      # ---------------------------------------------------------------- #
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: .github/cliff.toml
          args: --latest --strip header

      # ---------------------------------------------------------------- #
      # Publish release                                                  #
      # ---------------------------------------------------------------- #
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            dist/*
