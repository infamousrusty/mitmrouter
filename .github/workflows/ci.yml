name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ #
  # Lint                                                                #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (mitmrouter.sh + lib/)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.4.4

      - name: Ruff lint (auto-fix safe rules)
        run: ruff check --fix addons/ tests/

      - name: Ruff lint (verify – no unfixable errors remain)
        run: ruff check addons/ tests/

      - name: Ruff format (auto-fix)
        run: ruff format addons/ tests/

      - name: Ruff format check
        run: ruff format --check addons/ tests/

  # ------------------------------------------------------------------ #
  # Unit + integration tests                                            #
  # ------------------------------------------------------------------ #
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run light + medium tests with coverage
        run: |
          pytest tests/ -m "light or medium" \
            --cov=addons \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ------------------------------------------------------------------ #
  # Optional heavy tests (external tools required)                     #
  # ------------------------------------------------------------------ #
  test-heavy:
    name: Heavy Tests (external tools)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install external tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tshark zeek suricata

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run heavy tests
        run: pytest tests/ -m heavy --timeout=120 -v
