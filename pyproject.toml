[tool.ruff]
# Pin behaviour to match CI: ruff==0.4.4, Python 3.10 minimum target.
target-version = "py310"
line-length = 88
preview = false

[tool.ruff.format]
# Black-compatible defaults.
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "ANN", # flake8-annotations (partial)
    "BLE", # flake8-blind-except
    "ARG", # flake8-unused-arguments
]
ignore = [
    "ANN101",  # missing self annotation
    "ANN102",  # missing cls annotation
    "ANN401",  # Any annotations – used intentionally in addon ABC
    "E501",    # line too long – handled by formatter
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "light: fast unit tests with no external dependencies",
    "medium: integration tests using mitmproxy test harness only",
    "heavy: tests requiring external system tools (tshark, zeek, suricata)",
]
addopts = "-ra -q"
